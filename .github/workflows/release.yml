name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Ensure stable repo signing key
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .signing/hyperos-redirect.jks ]; then
            mkdir -p .signing
            keytool -genkeypair \
              -storetype PKCS12 \
              -keystore .signing/hyperos-redirect.jks \
              -storepass hyperos-redirect \
              -keypass hyperos-redirect \
              -alias hyperos-redirect \
              -keyalg RSA \
              -keysize 2048 \
              -validity 36500 \
              -dname "CN=HyperOS Media Redirect, OU=LSPosed, O=RezaFeng, L=Shanghai, S=Shanghai, C=CN"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            default_branch="${{ github.event.repository.default_branch }}"
            git add .signing/hyperos-redirect.jks
            git commit -m "Add stable signing key"
            git push origin "HEAD:${default_branch}"
          fi

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          gh release create "${tag_name}" \
            app/build/outputs/apk/release/hyperos-media-redirect-release.apk \
            --title "HyperOS Media Redirect ${tag_name}" \
            --generate-notes
